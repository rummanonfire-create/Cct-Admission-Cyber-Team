<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER CORPS | ELITE RECRUITMENT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* CORE SYSTEM STYLESHEET - VERSION 5.0 [ENHANCED] */
:root {
    --primary: #ff003c;
    --secondary: #00f3ff;
    --accent: #9d00ff;
    --alert: #ffe600;
    --success: #00ff9d;
    --dark: #0a0a0a;
    --panel: rgba(15, 15, 15, 0.92);
    --glass: rgba(255, 0, 60, 0.08);
    --border: 1px solid rgba(255, 0, 60, 0.4);
    --font-main: 'Orbitron', sans-serif;
    --font-code: 'Share Tech Mono', monospace;
    --glow-primary: 0 0 20px rgba(255, 0, 60, 0.6);
    --glow-secondary: 0 0 20px rgba(0, 243, 255, 0.4);
}

/* THEME VARIANTS */
[data-theme="neon"] {
    --primary: #00ff9d;
    --secondary: #ff00f7;
    --accent: #00f3ff;
    --glow-primary: 0 0 20px rgba(0, 255, 157, 0.6);
}
[data-theme="stealth"] {
    --primary: #555;
    --secondary: #888;
    --accent: #333;
    --dark: #000;
    --panel: rgba(5, 5, 5, 0.95);
    --glow-primary: none;
}

* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

body {
    background-color: var(--dark);
    color: #fff;
    font-family: var(--font-code);
    overflow-x: hidden;
    min-height: 100vh;    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
    transition: background 0.5s ease;
}

/* PARTICLE BACKGROUND */
#particleCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: -3; opacity: 0.4;
}

#matrixCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: -2; opacity: 0.25;
}

/* SCANLINE & NOISE OVERLAY */
.scanlines {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0px,
        rgba(255,255,255,0) 1px,
        rgba(0,0,0,0.15) 1px,
        rgba(0,0,0,0.15) 2px
    );
    z-index: 10; pointer-events: none; opacity: 0.5;
    animation: scanMove 8s linear infinite;
}
@keyframes scanMove { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }

.noise {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    z-index: 11; pointer-events: none; opacity: 0.3;
}

/* HUD HEADER */
.hud-header {
    position: fixed; top: 0; width: 100%; height: 70px;
    background: rgba(0,0,0,0.95);
    border-bottom: 2px solid var(--primary);
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 25px; z-index: 100;
    box-shadow: var(--glow-primary);
    backdrop-filter: blur(5px);
}
.brand {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--font-main); font-size: 22px;
    color: var(--primary); text-shadow: var(--glow-primary);
    letter-spacing: 2px;
}
.brand img {
    height: 45px; border: 2px solid var(--primary);
    border-radius: 3px; filter: drop-shadow(0 0 8px var(--primary));
    transition: transform 0.3s;
}
.brand img:hover { transform: scale(1.05) rotate(2deg); }

.status-panel {
    display: flex; align-items: center; gap: 20px;
    font-size: 11px; color: var(--secondary);
}

.status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); box-shadow: 0 0 10px var(--success);
    animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* THEME TOGGLE */
.theme-toggle {
    display: flex; gap: 5px; background: rgba(255,255,255,0.1);
    padding: 3px; border-radius: 20px; border: 1px solid var(--border);
}
.theme-btn {
    padding: 5px 12px; font-size: 10px; cursor: pointer;
    background: transparent; border: none; color: #666;
    font-family: var(--font-code); transition: 0.3s;
    border-radius: 15px;
}
.theme-btn.active {
    background: var(--primary); color: #000;
    box-shadow: var(--glow-primary); font-weight: bold;
}

/* MAIN CONTAINER */
.main-frame {
    width: 100%; max-width: 700px;
    background: var(--panel); backdrop-filter: blur(15px);
    border: var(--border); padding: 35px 40px;
    margin-top: 70px; position: relative;
    transform-style: preserve-3d;
    box-shadow: 0 10px 60px rgba(0,0,0,0.7), var(--glow-primary);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);    border-radius: 5px;
}
.main-frame:hover { transform: translateY(-3px) rotateX(1deg); }

/* CORNER DECORATIONS - ENHANCED */
.corner {
    position: absolute; width: 40px; height: 40px;
    border: 2px solid var(--primary); transition: 0.4s;
    pointer-events: none;
}
.c-tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
.c-tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
.c-bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
.c-br { bottom: -2px; right: -2px; border-left: none; border-top: none; }
.main-frame:hover .corner {
    width: 60px; height: 60px;
    box-shadow: 0 0 25px var(--primary);
    border-width: 3px;
}

/* GLITCH TITLE - ENHANCED */
.glitch-title {
    font-family: var(--font-main); font-size: 30px;
    text-align: center; margin: 10px 0 35px;
    position: relative; color: #fff;
    text-transform: uppercase; letter-spacing: 3px;
    text-shadow: 0 0 10px var(--primary);
}
.glitch-title::before, .glitch-title::after {
    content: attr(data-text); position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; background: var(--dark);
    opacity: 0.8;
}
.glitch-title::before {
    left: 3px; text-shadow: -2px 0 var(--primary);
    clip: rect(20px, 600px, 85px, 0);
    animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
}
.glitch-title::after {
    left: -3px; text-shadow: -2px 0 var(--secondary);
    clip: rect(80px, 600px, 130px, 0);
    animation: glitch-anim 2s infinite linear alternate-reverse;
}
@keyframes glitch-anim {
    0% { clip: rect(12px, 9999px, 35px, 0); transform: skew(0.5deg); }
    25% { clip: rect(75px, 9999px, 95px, 0); transform: skew(-0.3deg); }
    50% { clip: rect(15px, 9999px, 55px, 0); transform: skew(0.2deg); }
    75% { clip: rect(65px, 9999px, 85px, 0); transform: skew(-0.4deg); }
    100% { clip: rect(90px, 9999px, 110px, 0); transform: skew(0.1deg); }
}@keyframes glitch-anim-2 {
    0% { clip: rect(25px, 9999px, 45px, 0); transform: skew(-0.3deg); }
    30% { clip: rect(85px, 9999px, 105px, 0); transform: skew(0.4deg); }
    60% { clip: rect(20px, 9999px, 60px, 0); transform: skew(-0.2deg); }
    100% { clip: rect(95px, 9999px, 115px, 0); transform: skew(0.3deg); }
}

/* FORM ELEMENTS */
.input-group { margin-bottom: 22px; position: relative; }
label {
    display: block; font-size: 11px; color: var(--primary);
    margin-bottom: 6px; letter-spacing: 1.5px;
    text-transform: uppercase; font-weight: bold;
}
input, textarea, select {
    width: 100%; background: rgba(0,0,0,0.5);
    border: 1px solid #333; border-left: 3px solid #444;
    padding: 14px 15px; color: #fff;
    font-family: var(--font-code); font-size: 15px;
    outline: none; transition: 0.3s;
    border-radius: 2px;
}
input:focus, textarea:focus {
    border-color: var(--primary); border-left: 3px solid var(--primary);
    box-shadow: 0 0 20px rgba(255, 0, 60, 0.25);
    background: rgba(25, 0, 5, 0.6);
}
input::placeholder, textarea::placeholder {
    color: #555; font-style: italic;
}

/* CUSTOM RADIO SWITCH - UPGRADED */
.switch-container {
    display: flex; gap: 12px; margin-bottom: 25px;
    background: rgba(0,0,0,0.3); padding: 5px;
    border-radius: 30px; border: 1px solid var(--border);
}
.cyber-radio { flex: 1; position: relative; }
.cyber-radio input { display: none; }
.cyber-radio label {
    display: block; text-align: center; padding: 12px 8px;
    background: transparent; border: none;
    cursor: pointer; transition: 0.3s;
    color: #777; font-size: 12px; font-weight: 500;
    border-radius: 25px;
}
.cyber-radio input:checked + label {
    background: var(--primary); color: #000;
    box-shadow: var(--glow-primary);
    font-weight: 700; transform: scale(1.02);}

/* UPLOAD ZONES - ENHANCED */
.upload-zone {
    border: 2px dashed #444; padding: 25px 20px;
    text-align: center; cursor: pointer;
    margin-bottom: 18px; transition: 0.3s;
    background: rgba(0,0,0,0.25);
    border-radius: 5px; position: relative;
    overflow: hidden;
}
.upload-zone::before {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: 0.5s;
}
.upload-zone:hover::before { left: 100%; }
.upload-zone:hover {
    border-color: var(--secondary);
    background: rgba(0, 243, 255, 0.08);
    box-shadow: var(--glow-secondary);
}
.upload-zone i {
    font-size: 28px; color: var(--secondary);
    display: block; margin-bottom: 8px;
    text-shadow: 0 0 10px var(--secondary);
}
.upload-zone span {
    font-size: 13px; color: #aaa; display: block;
}
.preview-img {
    width: 100%; max-height: 180px; object-fit: contain;
    margin-top: 12px; display: none;
    border: 2px solid var(--primary); border-radius: 3px;
    box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
    animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* BIOMETRIC SCAN ANIMATION */
.biometric-wrapper { position: relative; }
.scan-line {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--secondary);
    box-shadow: 0 0 15px var(--secondary);
    animation: scanLine 2s ease-in-out infinite;
    display: none; border-radius: 2px;
}
@keyframes scanLine {    0%, 100% { top: 0; opacity: 0; }
    10% { opacity: 1; }
    50% { top: 100%; opacity: 1; }
    90% { opacity: 0; }
}
.upload-zone.scanning .scan-line { display: block; }
.upload-zone.scanning { border-color: var(--secondary); animation: pulseBorder 1.5s infinite; }
@keyframes pulseBorder {
    0%, 100% { box-shadow: 0 0 10px var(--secondary); }
    50% { box-shadow: 0 0 25px var(--secondary), 0 0 40px var(--secondary); }
}

/* PROGRESS BAR */
.progress-container {
    margin: 20px 0; display: none;
}
.progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--secondary);
    margin-bottom: 5px;
}
.progress-bar {
    height: 6px; background: #222; border-radius: 3px;
    overflow: hidden; border: 1px solid #444;
}
.progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    transition: width 0.3s ease;
    box-shadow: 0 0 10px var(--primary);
}

/* CONSOLE LOG - ENHANCED */
.console-log {
    background: #000; border: 1px solid #333;
    height: 120px; overflow-y: auto;
    padding: 12px; font-size: 11px;
    color: #0f0; margin-top: 25px;
    font-family: monospace; opacity: 0.9;
    border-radius: 3px;
    box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.1);
}
.log-entry {
    margin-bottom: 3px; padding-left: 15px;
    position: relative; border-left: 2px solid transparent;
    animation: slideIn 0.2s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
.log-entry::before {
    content: '>'; position: absolute; left: 3px;    color: var(--primary); font-weight: bold;
}
.log-warn { color: var(--alert); border-left-color: var(--alert); }
.log-err { color: var(--primary); border-left-color: var(--primary); }
.log-success { color: var(--success); border-left-color: var(--success); }

/* TYPING INDICATOR */
.typing::after {
    content: '▋'; animation: blink 1s infinite;
    color: var(--secondary);
}
@keyframes blink { 50% { opacity: 0; } }

/* SUBMIT BUTTON - UPGRADED */
.btn-submit {
    width: 100%; padding: 18px;
    background: transparent;
    border: 2px solid var(--primary);
    color: var(--primary);
    font-family: var(--font-main);
    font-size: 16px; font-weight: 900;
    letter-spacing: 4px; text-transform: uppercase;
    cursor: pointer; position: relative;
    overflow: hidden; transition: 0.4s;
    margin-top: 25px; border-radius: 3px;
    box-shadow: var(--glow-primary);
}
.btn-submit::before {
    content: ''; position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: 0.5s;
}
.btn-submit:hover::before { left: 100%; }
.btn-submit:hover {
    background: var(--primary); color: #000;
    box-shadow: 0 0 40px var(--primary);
    transform: translateY(-2px);
}
.btn-submit:disabled {
    border-color: #555; color: #555;
    cursor: not-allowed; box-shadow: none;
    background: transparent; transform: none;
}
.btn-submit.success {
    border-color: var(--success); color: var(--success);
    box-shadow: 0 0 30px var(--success);
    animation: successPulse 0.5s ease;
}
@keyframes successPulse {    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
}

/* SECURITY BADGE */
.security-badge {
    display: flex; align-items: center; gap: 8px;
    justify-content: center; margin-top: 20px;
    padding: 10px; background: rgba(0, 255, 157, 0.1);
    border: 1px solid var(--success); border-radius: 3px;
    font-size: 11px; color: var(--success);
}
.security-badge i { animation: rotateShield 3s linear infinite; }
@keyframes rotateShield { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* HIDDEN UTILS */
.hidden { display: none !important; }

/* RESPONSIVE */
@media (max-width: 768px) {
    .hud-header { padding: 0 15px; height: 60px; }
    .brand { font-size: 18px; }
    .brand img { height: 35px; }
    .status-panel { gap: 10px; font-size: 10px; }
    .main-frame {
        margin-top: 60px; padding: 25px 20px;
        max-width: 95%;
    }
    .glitch-title { font-size: 24px; }
    .switch-container { flex-direction: column; border-radius: 10px; }
    .cyber-radio label { padding: 10px; }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb {
    background: var(--primary); border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover { background: var(--secondary); }

/* ACCESSIBILITY */
@media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>
<!-- VISUAL LAYERS -->
<canvas id="particleCanvas"></canvas>
<canvas id="matrixCanvas"></canvas>
<div class="scanlines"></div>
<div class="noise"></div>

<!-- HUD HEADER -->
<div class="hud-header">
    <div class="brand">
        <img src="https://i.postimg.cc/bNsVzRSn/IMG-20260307-201742-901.png" alt="CYBER CORPS">
        CYBER<span style="color:#fff">CORPS</span>
    </div>
    
    <div class="status-panel">
        <div class="theme-toggle">
            <button class="theme-btn active" data-theme="crimson">CRIMSON</button>

            <button class="theme-btn" data-theme="stealth">STEALTH</button>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
            <div class="status-dot"></div>
            <span>SECURE</span>
        </div>
        <span id="clock" style="color:var(--alert); font-weight:bold;">00:00:00</span>
    </div>
</div>

<!-- MAIN INTERFACE -->
<div class="main-frame" id="frame3d">
    <div class="corner c-tl"></div><div class="corner c-tr"></div>
    <div class="corner c-bl"></div><div class="corner c-br"></div>

    <h1 class="glitch-title" data-text="AGENT REGISTRATION">AGENT REGISTRATION</h1>

    <form id="recruitForm">
        
        <!-- IDENTITY SECTION -->
        <div class="input-group">
            <label><i class="fas fa-fingerprint"></i> CODENAME / FULL NAME</label>
            <input type="text" id="name" required placeholder="ENTER IDENTIFIER..." autocomplete="off" maxlength="50">
        </div>

        <div class="switch-container">
            <div class="cyber-radio">

                <input type="radio" name="docType" id="typeBc" value="bc" onchange="toggleDocUI()">
                <label for="typeBc"><i class="fas fa-certificate"></i> BIRTH CERT.</label>            </div>

        <!-- DYNAMIC DOC UPLOAD -->

            <div class="upload-zone" onclick="triggerUpload('fileNidBack')">

        <!-- CONTACT SECTION -->
        <div class="input-group">

                <div class="scan-line"></div>

        <div class="input-group">

        <div class="input-group">

        <div class="input-group">

        <div class="input-group">
            <label><i class="fas fa-history"></i> PREVIOUS AFFILIATION</label>
            <input type="text" id="prevTeam" placeholder="Optional - Leave blank if none">
        </div>

        <div class="input-group">
            <label><i class="fas fa-bullseye"></i> MISSION STATEMENT</label>
            <textarea id="reason" rows="3" placeholder="WHY DO YOU SEEK ENTRY? MAX 500 CHARS..." maxlength="500"></textarea>
        </div>

        <!-- PROGRESS INDICATOR -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-label">
                <span>UPLOAD PROGRESS</span>

            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

        <button type="submit" class="btn-submit" id="btnSubmit">
            <i class="fas fa-link"></i> INITIATE UPLINK 📡
        </button>
        
        <!-- SECURITY BADGE -->
        <div class="security-badge">
            <i class="fas fa-shield-alt"></i>
            <span>END-TO-END ENCRYPTED • AES-256 • SECURE TRANSMISSION</span>
        </div>

        <!-- FAKE CONSOLE -->
        <div class="console-log" id="sysLog">
            <div class="log-entry">SYSTEM INITIALIZED v5.0</div>
            <div class="log-entry">SECURITY PROTOCOL: ACTIVE</div>
            <div class="log-entry typing">AWAITING AGENT INPUT</div>
        </div>

    </form>
</div>

<script>/**
 * CYBER CORPS PORTAL - CLIENT SIDE v5.0
 * ENHANCED SECURITY & VISUALS
 */

// --- AUDIO SYSTEM (Web Audio API) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    const now = audioCtx.currentTime;
    switch(type) {
        case 'type':
            osc.type = 'square';
            osc.frequency.setValueAtTime(700 + Math.random()*200, now);
            gain.gain.setValueAtTime(0.03, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            osc.start(now); osc.stop(now + 0.05);
            break;
        case 'hover':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(220, now);
            osc.frequency.exponentialRampToValueAtTime(330, now + 0.1);
            gain.gain.setValueAtTime(0.04, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
            break;
        case 'upload':
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
            break;
        case 'success':
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now); // C5
            osc.frequency.exponentialRampToValueAtTime(783.99, now + 0.15); // G5
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
            // Second note
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc2.type = 'sine';            osc2.frequency.setValueAtTime(659.25, now + 0.15); // E5
            gain2.gain.setValueAtTime(0.1, now + 0.15);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc2.start(now + 0.15); osc2.stop(now + 0.5);
            break;
        case 'error':
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(80, now + 0.25);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
            osc.start(now); osc.stop(now + 0.35);
            break;
    }
}

// --- MATRIX RAIN EFFECT ---
const matrixCanvas = document.getElementById("matrixCanvas");
const mCtx = matrixCanvas.getContext("2d");
let mWidth = matrixCanvas.width = window.innerWidth;
let mHeight = matrixCanvas.height = window.innerHeight;
const fontSize = 14;
const columns = Math.floor(mWidth / fontSize);
const drops = Array(columns).fill(1);
const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";

function drawMatrix() {
    mCtx.fillStyle = "rgba(10, 10, 10, 0.08)";
    mCtx.fillRect(0, 0, mWidth, mHeight);
    mCtx.fillStyle = "#ff003c";
    mCtx.font = `${fontSize}px monospace`;
    
    for(let i = 0; i < drops.length; i++) {
        const char = matrixChars.charAt(Math.floor(Math.random() * matrixChars.length));
        mCtx.fillText(char, i * fontSize, drops[i] * fontSize);
        if(drops[i] * fontSize > mHeight && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(drawMatrix, 50);

// --- PARTICLE SYSTEM ---
const particleCanvas = document.getElementById("particleCanvas");
const pCtx = particleCanvas.getContext("2d");
let pWidth = particleCanvas.width = window.innerWidth;
let pHeight = particleCanvas.height = window.innerHeight;
const particles = [];

class Particle {
    constructor() {        this.x = Math.random() * pWidth;
        this.y = Math.random() * pHeight;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.color = Math.random() > 0.5 ? '#ff003c' : '#00f3ff';
    }
    update() {
        this.x += this.speedX; this.y += this.speedY;
        if(this.x < 0 || this.x > pWidth) this.speedX *= -1;
        if(this.y < 0 || this.y > pHeight) this.speedY *= -1;
    }
    draw() {
        pCtx.fillStyle = this.color;
        pCtx.globalAlpha = this.opacity;
        pCtx.beginPath();
        pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        pCtx.fill();
        pCtx.globalAlpha = 1;
    }
}

for(let i = 0; i < 80; i++) particles.push(new Particle());

function animateParticles() {
    pCtx.clearRect(0, 0, pWidth, pHeight);
    particles.forEach(p => { p.update(); p.draw(); });
    // Draw connections
    pCtx.strokeStyle = 'rgba(255, 0, 60, 0.1)';
    pCtx.lineWidth = 0.5;
    for(let i = 0; i < particles.length; i++) {
        for(let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if(dist < 120) {
                pCtx.globalAlpha = (120 - dist) / 120 * 0.15;
                pCtx.beginPath();
                pCtx.moveTo(particles[i].x, particles[i].y);
                pCtx.lineTo(particles[j].x, particles[j].y);
                pCtx.stroke();
            }
        }
    }
    pCtx.globalAlpha = 1;
    requestAnimationFrame(animateParticles);
}
animateParticles();

// Typing effect for console
function typeConsole(text, element) {
    let i = 0;
    element.textContent = '';
    element.classList.add('typing');

        if(i > text.length) {

        }
    }, 30);
}

// Image Preview with Scan Effect
function setupPreview(inputId, imgId, zoneSelector) {
    const input = document.getElementById(inputId);
    const img = document.getElementById(imgId);    const zone = input.closest(zoneSelector || '.upload-zone');
    
    input.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        // Validate file type
        if(!file.type.startsWith('image/')) {
            log(`REJECTED: Invalid file type - ${file.type}`, "err");
            playSound('error');
            return;
        }
        
        // Validate file size (max 5MB)
        if(file.size > 5 * 1024 * 1024) {
            log(`REJECTED: File exceeds 5MB limit`, "err");
            playSound('error');
            return;
        }
        
        // Start scan animation
        zone.classList.add('scanning');
        log(`ANALYZING: ${file.name}...`, "warn");
        
        const reader = new FileReader();
        reader.onload = function(e) {
            // Simulate scan delay
            setTimeout(() => {
                img.src = e.target.result;
                img.style.display = "block";
                zone.classList.remove('scanning');
                log(`BIOMETRIC VERIFIED: ${file.name} (${(file.size/1024).toFixed(1)} KB)`, "success");
                playSound('upload');
            }, 1200);
        }
        reader.onerror = () => {
            zone.classList.remove('scanning');
            log(`ERROR: Failed to read file`, "err");
            playSound('error');
        }
        reader.readAsDataURL(file);
    });
}

function updateProgress(percent) {
    const container = document.getElementById('progressContainer');
    const fill = document.getElementById('progressFill');
    const label = document.getElementById('progressPercent');
    
    if(percent > 0) container.style.display = 'block';
    fill.style.width = `${Math.min(percent, 100)}%`;
    label.textContent = `${Math.min(percent, 100)}%`;
        if(percent >= 100) {
        setTimeout(() => { container.style.display = 'none'; }, 1000);
    }
}

// --- SUBMISSION LOGIC ---
document.getElementById("recruitForm").addEventListener("submit", async function(e){
    e.preventDefault();
    
    const btn = document.getElementById("btnSubmit");
    const docType = document.querySelector('input[name="docType"]:checked').value;
    const originalBtnText = btn.innerHTML;
    
    // Validation
    const profileFile = document.getElementById("fileProfile").files[0];
    if(!profileFile) {
        log("CRITICAL: BIOMETRIC SCAN REQUIRED", "err");
        playSound('error');
        document.querySelector('.biometric-wrapper').style.animation = 'shake 0.5s';
        setTimeout(() => document.querySelector('.biometric-wrapper').style.animation = '', 500);
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-lock"></i> ENCRYPTING...';
    log("INITIATING SECURE HANDSHAKE...", "warn");
    playSound('upload');
    
    // Simulate encryption phases
    const phases = [
        { msg: "GENERATING AES-256 KEY...", delay: 400 },
        { msg: "ENCRYPTING PAYLOAD...", delay: 600 },
        { msg: "HASHING BIOMETRICS...", delay: 500 },
        { msg: "ESTABLISHING SECURE TUNNEL...", delay: 700 }
    ];
    
    for(const phase of phases) {
        await new Promise(r => setTimeout(r, phase.delay));
        log(phase.msg, "info");
        updateProgress(Math.random() * 30 + 20);
    }
    
    // Prepare FormData
    const formData = new FormData();
    formData.append("name", document.getElementById('name').value.trim());
    formData.append("docType", docType);
    formData.append("phone", document.getElementById('phone').value.trim());
    formData.append("fb", document.getElementById('fb').value.trim());
    formData.append("email", document.getElementById('email').value.trim());
    formData.append("prevTeam", document.getElementById('prevTeam').value.trim() || 'NONE');    formData.append("reason", document.getElementById('reason').value.trim());
    formData.append("profile", profileFile);
    
    if(docType === 'nid') {
        const f = document.getElementById("fileNidFront").files[0];
        const b = document.getElementById("fileNidBack").files[0];
        if(f) formData.append("docFront", f);
        if(b) formData.append("docBack", b);
    } else {
        const bc = document.getElementById("fileBc").files[0];
        if(bc) formData.append("docSingle", bc);
    }
    
    try {
        log("TRANSMITTING DATA PACKET...", "warn");
        updateProgress(85);
        
        const res = await fetch('/api/recruit', {
            method: 'POST',
            body: formData
        });
        
        updateProgress(100);
        const result = await res.json();
        
        if(!res.ok) throw new Error(result.message || "TRANSMISSION FAILED");
        
        // Success sequence
        playSound('success');
        log("PAYLOAD DELIVERED ✓", "success");
        log("AWAITING COMMAND RESPONSE...", "info");
        
        btn.innerHTML = '<i class="fas fa-check-circle"></i> ACCESS GRANTED';
        btn.classList.add('success');
        
        // Show final message
        setTimeout(() => {
            typeConsole("WELCOME TO CYBER CORPS, AGENT.", document.querySelector('.glitch-title'));
            log("SESSION TERMINATED. STAY VIGILANT.", "success");
        }, 1500);
        
    } catch(err) {
        playSound('error');
        log(`CONNECTION LOST: ${err.message}`, "err");
        btn.disabled = false;
        btn.innerHTML = originalBtnText;
        updateProgress(0);
        
        // Shake animation
        document.querySelector('.main-frame').style.animation = 'shake 0.5s';        setTimeout(() => document.querySelector('.main-frame').style.animation = '', 500);
    }
});
